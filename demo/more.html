<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>more | naman kumar</title>
    <meta name="description" content="more about naman: hobbies, interests, and other things." />
    <link rel="icon" type="image/png" href="fav.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button class="theme-toggle" id="theme-toggle" aria-label="toggle dark mode" title="toggle dark mode">
      <span class="toggle-mark" aria-hidden="true">?</span>
    </button>

    <header class="site-header">
      <div class="profile-wrap">
        <div>
          <h1>more</h1>
          <p class="subtitle">wouldn't you like to know</p>
          <p>
            <a href="index.html">home</a>
            |
            <a href="more.html">more</a>
          </p>
        </div>
      </div>
    </header>

    <main>
      <section id="hobbies" aria-labelledby="hobbies-title">
        <h2 id="hobbies-title">&gt; coming soon</h2>
      </section>
    </main>

    <footer>
      <p>© 2026 naman kumar</p>
    </footer>

    <script>
      (() => {
        const toggle = document.getElementById("theme-toggle");
        const preferred = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const saved = localStorage.getItem("theme") || preferred;

        const setTheme = (mode) => {
          document.body.setAttribute("data-theme", mode);
          toggle.setAttribute("aria-label", mode === "dark" ? "switch to light mode" : "switch to dark mode");
          toggle.setAttribute("title", mode === "dark" ? "switch to light mode" : "switch to dark mode");
        };

        setTheme(saved);

        toggle.addEventListener("click", () => {
          const next = document.body.getAttribute("data-theme") === "dark" ? "light" : "dark";
          setTheme(next);
          localStorage.setItem("theme", next);
        });
      })();
    </script>
  </body>
</html>
